<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <title>YHÁWEH | Rede Coméia</title>
    <style>
        /* Estética da Unidade Existencial */
        body { margin: 0; background: #000; color: #0ff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        
        .main-wrapper { display: flex; width: 200vw; height: 100vh; transition: transform 0.8s cubic-bezier(0.85, 0, 0.15, 1); }
        
        /* Seção 1: A Colmeia (Favos 3D) */
        .section-hive { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column; background: radial-gradient(circle, #001a1a 0%, #000 70%); }
        
        .hive-grid { display: grid; grid-template-columns: repeat(3, 110px); gap: 15px; perspective: 1200px; }
        
        .favo { 
            width: 100px; height: 115px; background: rgba(0, 255, 255, 0.05); border: 1px solid #0ff;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex; justify-content: center; align-items: center; cursor: pointer;
            transition: all 0.4s ease; transform: rotateX(10deg) rotateY(-10deg);
            font-weight: bold; font-size: 0.8em; text-align: center;
        }
        
        .favo:hover { transform: scale(1.2) rotateX(0deg) rotateY(0deg); background: rgba(0, 255, 255, 0.3); box-shadow: 0 0 25px #0ff; color: #fff; }
